<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Middle Class Daily Expense Tracker</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --danger: #e74c3c;
            --light: #ecf0f1;
            --dark: #34495e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h2, h3 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
        }
        #auth-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .auth-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 320px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { opacity: 0.9; }
        .btn-danger { background: var(--danger); }
        .btn-link { background: none; color: #3498db; border: none; padding: 5px; font-size: 14px; cursor: pointer; text-decoration: underline;}
        .btn-secondary { background: #7f8c8d; margin-top: 5px; }
        .info-bar {
            display: flex;
            justify-content: space-between;
            background: var(--light);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .summary-box {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .card {
            background: #e8f4fd;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            font-size: 14px;
        }
        .card span { display: block; font-size: 18px; font-weight: bold; color: var(--primary); margin-top: 5px;}
        .history-list {
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
        }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 5px solid var(--secondary);
            border-radius: 4px;
        }
        .item.undoing { border-left-color: var(--danger); background: #fde8e8;}
        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #7f8c8d;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <!-- Dynamic Password Security Block -->
    <div id="auth-screen">
        <div class="auth-box">
            <h2 id="auth-title">Security Lock</h2>
            <p id="auth-subtitle" style="font-size: 13px; color: gray;">Keep your family savings safe.</p>
            
            <div id="setup-choice-buttons">
                <button onclick="setupPasswordChoice(true)">Yes, Set Password</button>
                <button class="btn-secondary" onclick="setupPasswordChoice(false)">No, Open Without Password</button>
            </div>

            <div id="password-form-block" style="display: none;">
                <input type="password" id="password-input" placeholder="Enter Password">
                <button id="auth-btn" onclick="verifyOrSavePassword()">Submit</button>
                <div style="margin-top: 15px;">
                    <button class="btn-link" id="forgot-btn" onclick="forgotPassword()" style="display:none;">Forgot Password?</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Expense Dashboard -->
    <div class="container">
        <h2>Expense Calculator</h2>
        
        <div class="info-bar">
            <div id="ist-date">Date: Loading...</div>
            <div id="ist-time">IST Time: Loading...</div>
        </div>

        <div style="text-align: center; margin-bottom: 15px;">
            <button class="btn-link" id="lock-status-btn" onclick="toggleSecurityMode()" style="color: #2c3e50; font-weight: bold;"></button>
        </div>

        <div class="summary-box">
            <div class="card">Today's Spend<span>₹<span id="total-day">0</span></span></div>
            <div class="card">Monthly Total<span>₹<span id="total-month">0</span></span></div>
            <div class="card">Est. 1 Year Spend<span>₹<span id="total-year">0</span></span></div>
        </div>

        <hr>

        <h3>Add New Spend (Wake up to Sleep)</h3>
        <form id="expense-form" onsubmit="addExpense(event)">
            <label for="object-purpose">Select Purpose / Routine Object:</label>
            <select id="object-purpose" onchange="toggleCustomInput()">
                <option value="Milk (Daily Morning Routine)">🥛 Daily Morning Milk</option>
                <option value="Home Rent (Monthly)">🏠 Home Rent (Monthly)</option>
                <option value="Groceries & Vegetables">🛒 Daily Groceries / Veggies</option>
                <option value="Chai / Snacks">☕ Chai & Snacks</option>
                <option value="Transport / Petrol">🏍️ Petrol / Bus / Auto fare</option>
                <option value="Electricity / Water Bill">⚡ Utility Bills</option>
                <option value="Children Education / Pocket Money">🎒 Education / Kids</option>
                <option value="Medical / Pharmacy">💊 Emergency / Medicine</option>
                <option value="Other">✏️ Other Expense (Type Below)</option>
            </select>

            <input type="text" id="custom-object" placeholder="What did you buy? Name of object" style="display:none;">
            <input type="number" id="object-price" placeholder="Enter Price (₹)" required min="0" step="any">

            <button type="submit">Add to Daily Ledger</button>
        </form>

        <hr>

        <h3>Spending History Ledger</h3>
        <div class="history-list" id="ledger-history"></div>

        <div class="footer">
            Designed & Engineered by <strong>Laxmikant</strong><br>
            Tracking Financial Discipline Daily
        </div>
    </div>

    <script>
        let currentPassword = localStorage.getItem('wallet_pwd') || '';
        let skipPassword = localStorage.getItem('wallet_skip_pwd') || 'false';
        let expenses = JSON.parse(localStorage.getItem('wallet_expenses')) || [];
        let temporaryTimers = {};

        window.onload = function() {
            updateLockStatusText();
            startClock();
            renderLedger();

            const authScreen = document.getElementById('auth-screen');
            if (currentPassword) {
                showPasswordForm("Enter Security Password", "This app is secured.", "Unlock Ledger", true);
            } else if (skipPassword === 'true') {
                authScreen.style.display = 'none';
            } else {
                document.getElementById('setup-choice-buttons').style.display = 'block';
                document.getElementById('password-form-block').style.display = 'none';
            }
        }

        function showPasswordForm(title, subtitle, btnText, showForgot) {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('setup-choice-buttons').style.display = 'none';
            document.getElementById('password-form-block').style.display = 'block';
            document.getElementById('auth-title').innerText = title;
            document.getElementById('auth-subtitle').innerText = subtitle;
            document.getElementById('auth-btn').innerText = btnText;
            document.getElementById('forgot-btn').style.display = showForgot ? "inline-block" : "none";
        }

        function setupPasswordChoice(wantPassword) {
            if (wantPassword) {
                showPasswordForm("Setup New Password", "Create a password to secure your daily histories.", "Save Password", false);
            } else {
                localStorage.setItem('wallet_skip_pwd', 'true');
                document.getElementById('auth-screen').style.display = 'none';
                updateLockStatusText();
            }
        }

        function verifyOrSavePassword() {
            const input = document.getElementById('password-input').value;
            if (!input) return alert("Please type a valid password.");

            if (!currentPassword) {
                localStorage.setItem('wallet_pwd', input);
                localStorage.setItem('wallet_skip_pwd', 'false');
                currentPassword = input;
                alert("Password saved successfully!");
            } else if (input !== currentPassword) {
                return alert("Incorrect Password! Access Denied.");
            }

            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('password-input').value = '';
            updateLockStatusText();
        }

        function forgotPassword() {
            if (confirm("Do you want to clear your current password and create a new one? Your ledger histories will remain safe.")) {
                let newPwd = prompt("Enter your NEW secure password:");
                if (newPwd) {
                    localStorage.setItem('wallet_pwd', newPwd);
                    localStorage.setItem('wallet_skip_pwd', 'false');
                    currentPassword = newPwd;
                    alert("Password updated successfully! Reloading...");
                    location.reload();
                }
            }
        }

        function toggleSecurityMode() {
            if (currentPassword) {
                if (confirm("Remove password security completely? This website will open directly next time.")) {
                    localStorage.removeItem('wallet_pwd');
                    localStorage.setItem('wallet_skip_pwd', 'true');
                    currentPassword = '';
                    location.reload();
                }
            } else {
                localStorage.setItem('wallet_skip_pwd', 'false');
                location.reload();
            }
        }

        function updateLockStatusText() {
            const btn = document.getElementById('lock-status-btn');
            btn.innerHTML = currentPassword ? "🔒 Lock Status: ENABLED (Click to Remove)" : "🔓 Lock Status: DISABLED (Click to Create Password)";
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                const optionsDate = { timeZone: 'Asia/Kolkata', year: 'numeric', month: 'long', day: 'numeric' };
                const optionsTime = { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
                document.getElementById('ist-date').innerText = "Date: " + now.toLocaleDateString('en-IN', optionsDate);
                document.getElementById('ist-time').innerText = "IST: " + now.toLocaleTimeString('en-IN', optionsTime);
            }, 1000);
        }

        function toggleCustomInput() {
            document.getElementById('custom-object').style.display = (document.getElementById('object-purpose').value === "Other") ? "block" : "none";
        }

        function addExpense(e) {
            e.preventDefault();
            const select = document.getElementById('object-purpose');
            let purpose = select.value === "Other" ? (document.getElementById('custom-object').value || "Miscellaneous") : select.value;
            const price = parseFloat(document.getElementById('object-price').value);

            const timestamp = new Date().getTime();
            expenses.unshift({ id: timestamp, purpose, price });
            
            localStorage.setItem('wallet_expenses', JSON.stringify(expenses));
            renderLedger();

            temporaryTimers[timestamp] = setTimeout(() => {
                const itemEl = document.getElementById(`item-${timestamp}`);
                if (itemEl) {
                    itemEl.classList.remove('undoing');
                    itemEl.querySelector('.action-btn').innerHTML = "🗑️ Delete";
                }
                delete temporaryTimers[timestamp];
            }, 3000);

            document.getElementById('object-price').value = '';
            document.getElementById('custom-object').value = '';
            select.selectedIndex = 0;
            toggleCustomInput();
        }

        function handleActionClick(id) {
            if (temporaryTimers[id]) {
                clearTimeout(temporaryTimers[id]);
                delete temporaryTimers[id];
                executeDeletion(id);
            } else if (confirm("Delete this permanent record history?")) {
                executeDeletion(id);
            }
        }

        function executeDeletion(id) {
            expenses = expenses.filter(item => item.id !== id);
            localStorage.setItem('wallet_expenses', JSON.stringify(expenses));
            renderLedger();
        }

        function renderLedger() {
            const container = document.getElementById('ledger-history');
            container.innerHTML = '';
            let dayTotal = 0;

            expenses.forEach(item => {
                dayTotal += item.price;
                const isUndo = temporaryTimers[item.id] ? 'undoing' : '';
                const label = temporaryTimers[item.id] ? "⚡ Undo (3s)" : "🗑️ Delete";

                container.innerHTML += `
                    <div class="item ${isUndo}" id="item-${item.id}">
                        <div><strong>${item.purpose}</strong><br><small style="color:gray;">₹${item.price.toFixed(2)}</small></div>
                        <button class="btn-danger action-btn" style="width:auto; padding: 5px 10px; font-size:12px;" onclick="handleActionClick(${item.id})">${label}</button>
                    </div>`;
            });

            document.getElementById('total-day').innerText = dayTotal.toLocaleString('en-IN');
            document.getElementById('total-month').innerText = (dayTotal * 30).toLocaleString('en-IN');
            document.getElementById('total-year').innerText = (dayTotal * 365).toLocaleString('en-IN');
        }
    </script>
</body>
</html>
